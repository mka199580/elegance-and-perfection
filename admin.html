<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>E&P Admin</title><link rel="stylesheet" href="style.css"></head><body class="admin-body"><main class="admin-shell"><section id="loginPanel" class="admin-card"><h1>E&P Admin</h1><p>Private product dashboard</p><input id="password" type="password" placeholder="Password"><button id="loginBtn" class="primary-btn">Login</button><small>Default password: EP2026. Change it in config.js.</small></section><section id="dashboard" class="admin-card hidden"><div class="admin-top"><div><h1>Product Dashboard</h1><p>Add handbags to the live collection.</p></div><button id="logoutBtn" class="ghost-btn">Logout</button></div><form id="productForm" class="admin-form"><select id="brand"></select><input id="name" placeholder="Product name" required><input id="size" placeholder="Size / dimensions"><input id="condition" placeholder="Condition"><input id="price" placeholder="Price or Inquire"><textarea id="description" placeholder="Description"></textarea><input id="image" type="file" accept="image/*"><button class="primary-btn" type="submit">Publish Product</button></form><div id="adminProducts" class="admin-products"></div></section></main><script src="config.js"></script><script src="admin.js"></script></body></html>

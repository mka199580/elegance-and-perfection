<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>E&P Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="adminBody">
  <header class="topbar adminTopbar">
    <a class="logo" href="index.html">E&P</a>
    <nav>
      <a href="index.html">View Site</a>
    </nav>
  </header>

  <main class="adminShell">
    <aside class="adminSidebar">
      <h1>E&P Admin</h1>
      <p>Manage products for the quiet luxury showroom.</p>
      <button id="newProductBtn" class="requestBtn full">Add New Product</button>
    </aside>

    <section class="adminPanel">
      <h2>Products</h2>
      <form id="productForm" class="productForm">
        <input type="hidden" id="productId" />
        <label>Brand
          <select id="brand" required></select>
        </label>
        <label>Product Name
          <input id="name" required placeholder="Lady Dior Medium" />
        </label>
        <label>Price
          <input id="price" required placeholder="450 KWD" />
        </label>
        <label>Description
          <textarea id="description" rows="5" placeholder="Color: Black&#10;Material: Cannage Lambskin&#10;Size: Medium&#10;Condition: Excellent"></textarea>
        </label>
        <label>Product Photos
          <input id="images" type="file" accept="image/*" multiple />
        </label>
        <p class="microcopy">Photos upload to Supabase Storage bucket: <strong>products</strong></p>
        <button class="requestBtn" type="submit">Publish Product</button>
        <button class="underlineButton" type="button" id="resetForm">Clear</button>
        <p id="adminMessage" class="adminMessage"></p>
      </form>

      <div class="tableWrap">
        <table>
          <thead>
            <tr><th>Image</th><th>Name</th><th>Brand</th><th>Price</th><th>Actions</th></tr>
          </thead>
          <tbody id="productsTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>

<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>E&P Admin</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">
  <header class="site-header">
    <a href="index.html" class="brand-mark">E&amp;P</a>
    <nav><a class="ghost-link" href="index.html">View site</a></nav>
  </header>

  <main class="admin-shell">
    <section id="authPanel" class="admin-card narrow">
      <p class="eyebrow">Private admin</p>
      <h1>Admin Login</h1>
      <p class="muted">Sign in with your Supabase admin email.</p>

      <input id="email" type="email" placeholder="Email" autocomplete="email" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="loginBtn" class="dark-btn" type="button">Login</button>
      <button id="forgotBtn" class="text-btn" type="button">Forgot password?</button>

      <div id="resetBox" class="reset-box hidden">
        <h3>Set New Password</h3>
        <input id="newPassword" type="password" placeholder="New password" autocomplete="new-password" />
        <button id="updatePasswordBtn" class="dark-btn" type="button">Set New Password</button>
      </div>

      <p id="authMsg" class="status"></p>
    </section>

    <section id="dashboard" class="hidden">
      <div class="admin-top">
        <div>
          <p class="eyebrow">Dashboard</p>
          <h1>Product Management</h1>
        </div>
        <div class="admin-actions">
          <button id="changePasswordOpen" class="ghost-btn" type="button">Change Password</button>
          <button id="logoutBtn" class="dark-btn" type="button">Logout</button>
        </div>
      </div>

      <div id="changePasswordBox" class="admin-card hidden">
        <h2>Change Password</h2>
        <input id="dashboardNewPassword" type="password" placeholder="New password" />
        <button id="dashboardUpdatePassword" class="dark-btn" type="button">Update Password</button>
        <p id="passwordMsg" class="status"></p>
      </div>

      <section class="admin-card">
        <h2 id="formTitle">Add Product</h2>
        <div class="form-grid">
          <select id="brand"></select>
          <input id="name" type="text" placeholder="Product name" />
          <input id="price" type="text" placeholder="Price" />
          <input id="size" type="text" placeholder="Size / dimensions" />
          <input id="condition" type="text" placeholder="Condition" />
          <textarea id="description" placeholder="Description"></textarea>
          <input id="imageUrls" type="text" placeholder="Image URLs, separated by commas (optional)" />
          <input id="imageFiles" type="file" accept="image/*" multiple />
          <label class="check-row"><input id="visible" type="checkbox" checked /> Visible on website</label>
        </div>
        <div class="admin-actions left">
          <button id="saveProductBtn" class="dark-btn" type="button">Publish Product</button>
          <button id="cancelEditBtn" class="ghost-btn hidden" type="button">Cancel Edit</button>
        </div>
        <p id="productMsg" class="status"></p>
      </section>

      <section class="admin-card">
        <div class="section-title-row">
          <h2>Published Products</h2>
          <button id="refreshProducts" class="ghost-btn" type="button">Refresh</button>
        </div>
        <div id="adminProducts" class="admin-products"></div>
      </section>
    </section>
  </main>

  <script src="supabase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>

backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

publish_mode: simple

collections:
  - name: "catalog"
    label: "E&P Catalog"
    files:
      - file: "data/products.json"
        label: "Products"
        name: "products"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.brand}} - {{fields.name}}"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Arabic Product Name", name: "name_ar", widget: "string", required: false }
              - label: "Brand / Category"
                name: "brand"
                widget: "select"
                options: ["Hermès", "Chanel", "Dior", "YSL", "LV", "Gucci", "Prada", "Fendi", "Celine", "Bottega Veneta", "Valentino", "Balenciaga", "Loewe", "Miu Miu", "Burberry", "Goyard"]
              - { label: "Price", name: "price", widget: "string", required: false, hint: "Example: KWD 120" }
              - { label: "Short Description", name: "description", widget: "string", required: false }
              - { label: "Arabic Description", name: "description_ar", widget: "string", required: false }
              - { label: "Available", name: "available", widget: "boolean", default: true }
              - label: "Product Photos"
                name: "images"
                widget: "list"
                min: 1
                max: 8
                field: { label: "Photo", name: "image", widget: "image" }
